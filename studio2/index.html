<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caffeine Cravings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inspiration&family=Inria+Sans:wght@300;400;700&family=Instrument+Serif:ital@0;1&family=Intel+One+Mono:wght@400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

    <link href="styles.css" rel="stylesheet">

</head>
<body>
    <main id="page">

        <img src="images/stain.png" alt="" id="stain">

        <h1>Caffeine Cravings</h1>

        <img src="images/cup.png" alt="Coffee cup" id="cup">

        <section id="receipt">
            <div class="receipt-top">
                <span>RECEIPT</span>
                <span>COHO</span>
            </div>
            <div class="receipt-line"></div>
            <p class="receipt-note">Wake up time!</p>
        </section>

        <img src="images/emoji4.png" alt="Mood emoji" id="emoji">

        <div id="definition">
            <p>Coffee<br>(n.) A legal drug</p>
        </div>

        <section id="timeline-wrap" aria-label="Caffeine cravings time selector">
            <div class="timeline">
                <input type="radio" name="time" id="t8am">
                <label for="t8am"><span class="dot"></span><span class="time">8am</span></label>

                <input type="radio" name="time" id="t9am">
                <label for="t9am"><span class="dot"></span><span class="time">9am</span></label>

                <input type="radio" name="time" id="t10am">
                <label for="t10am"><span class="dot"></span><span class="time">10am</span></label>

                <input type="radio" name="time" id="t11am">
                <label for="t11am"><span class="dot"></span><span class="time">11am</span></label>

                <input type="radio" name="time" id="t12pm" checked>
                <label for="t12pm"><span class="dot"></span><span class="time">12pm</span></label>

                <input type="radio" name="time" id="t1pm">
                <label for="t1pm"><span class="dot"></span><span class="time">1pm</span></label>

                <input type="radio" name="time" id="t2pm">
                <label for="t2pm"><span class="dot"></span><span class="time">2pm</span></label>

                <input type="radio" name="time" id="t3pm">
                <label for="t3pm"><span class="dot"></span><span class="time">3pm</span></label>

                <input type="radio" name="time" id="t4pm">
                <label for="t4pm"><span class="dot"></span><span class="time">4pm</span></label>

                <input type="radio" name="time" id="t5pm">
                <label for="t5pm"><span class="dot"></span><span class="time">5pm</span></label>

                <input type="radio" name="time" id="t6pm">
                <label for="t6pm"><span class="dot"></span><span class="time">6pm</span></label>

                <input type="radio" name="time" id="t7pm">
                <label for="t7pm"><span class="dot"></span><span class="time">7pm</span></label>

                <input type="radio" name="time" id="t8pm">
                <label for="t8pm"><span class="dot"></span><span class="time">8pm</span></label>

                <input type="radio" name="time" id="t9pm">
                <label for="t9pm"><span class="dot"></span><span class="time">9pm</span></label>

                <input type="radio" name="time" id="t10pm">
                <label for="t10pm"><span class="dot"></span><span class="time">10pm</span></label>

                <input type="radio" name="time" id="t11pm">
                <label for="t11pm"><span class="dot"></span><span class="time">11pm</span></label>

            </div>
        </section>

    </main>
</body>
</html>
