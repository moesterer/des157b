<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- link to leaflet css -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">

    <!-- link to custom css -->
    <link href="styles.css" rel="stylesheet">

    <!-- link to the leaflet js -->
    <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

    <!-- link to Granim.js -->
    <script src="https://cdn.jsdelivr.net/npm/granim@2.0.0/dist/granim.min.js"></script>

    <!-- link to custom js -->
    <script src="script.js" defer></script>
    
    <title>Library Challenge</title>
</head>
<body>

    <header>
        <h1>Places From My Childhood</h1>
        <canvas id="gradient-bar"></canvas>
        <p>This interactive map shows three places that were important to me growing up.</p>
    </header>

    <main>
        <div id="map"></div>
    </main>
    
</body>
</html>
